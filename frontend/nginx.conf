# 两个入口, 不强制 HTTPS:
# - 80  纯 HTTP: 无自签证书弹窗, 日常使用方便。注意浏览器麦克风语音
#   (getUserMedia / SpeechRecognition) 要求 secure context, HTTP 下不可用
#   (localhost 除外); 文字输入 / 查看 / 3D 不受影响。
# - 443 HTTPS (自签): 需要在 iPad / 手机上用语音时走这个。
server {
    listen 80 default_server;
    server_name _;
    include /etc/nginx/app-common.conf;
}

server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    include /etc/nginx/app-common.conf;
}
