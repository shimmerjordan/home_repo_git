# HTTP (80) + HTTPS (443) 双入口。
# - HTTP  : 本机访问 / 下载 CA 证书用 (http://<ip>:8080/ca.crt)。
# - HTTPS : iPad/手机等局域网设备用语音 (麦克风) 必须走这里 —— getUserMedia 要求
#           secure context, Safari 对局域网 IP 无 HTTP 豁免。装信任本地 CA 后无弹窗。
server {
    listen 80 default_server;
    server_name _;
    include /etc/nginx/app-routes.conf;
}

server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    include /etc/nginx/app-routes.conf;
}
